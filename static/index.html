<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  body {
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1 {
    padding: 16px 24px;
    font-size: 18px;
    border-bottom: 1px solid #2a2a2a;
    background: #141414;
}

#chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#chat-form {
    display: flex;
    padding: 16px;
    border-top: 1px solid #2a2a2a;
    background: #141414;
    gap: 8px;
}

#message-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #1e1e1e;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
}

button {
    padding: 12px 20px;
    background: #00ff88;
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}
.message {
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 70%;
    font-size: 14px;
    line-height: 1.6;
}

.user-message {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    align-self: flex-end;
}

.bot-message {
    background: #141414;
    border-left: 3px solid #00ff88;
    align-self: flex-start;
}
</style>
    <title>TechNova Support</title>
</head>
<body>
    <h1>TechNova Support</h1>
    <div id="chat-container">
        <div id="messages"></div>
        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Type your message here...">
            <button type="submit" id="send-button">Send</button>
        </form>
    </div>
    <script>
        function addMessage(role, text) {
            const p = document.createElement("p")
            p.textContent = text
            p.classList.add("message")
            p.classList.add(role === "user" ? "user-message" : "bot-message")
            messagesDiv.appendChild(p)
            messagesDiv.scrollTop = messagesDiv.scrollHeight
            return p
        }
        let conversationHistory = []
        const sendButton = document.getElementById("send-button")
        const messageInput = document.getElementById("message-input")
        const messagesDiv = document.getElementById("messages") 
        
        const chatForm = document.getElementById("chat-form")
        chatForm.addEventListener("submit", function(event) {
            event.preventDefault()
            const userMessage = messageInput.value
            console.log("user typed:", userMessage)
            addMessage("user", userMessage)
            conversationHistory.push({role: "user", content: userMessage})
            console.log("history after push:", conversationHistory)
            messageInput.value = ""
            const loadingMsg = addMessage("bot", "Thinking...")
            fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({messages: conversationHistory})
            })
            .then(function(response) {
                loadingMsg.remove()
                return response.json()
            })
            .then(function(data) {
                conversationHistory.push({role: "assistant", content: data.reply})
                addMessage("bot", data.reply)
            })
        })
    </script>
</body>
</html>
